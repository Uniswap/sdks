name: "Monorepo Integrity"

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main

permissions: {}

jobs:
  monorepo-integrity:
    name: Check monorepo integrity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: bullfrogsec/bullfrog@dcde5841b19b7ef693224207a7fdec67fce604db # v0.8.3
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          fetch-depth: 2
          submodules: "true"
          persist-credentials: false

      - name: 💽 Setup Node
        uses: actions/setup-node@1a4442cacd436585916779262731d5b162bc6ec7
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: 1.3.10

      - name: 📥 Install dependencies
        shell: bash
        working-directory: ./
        run: |
<<<<<<< Updated upstream
          bun install --frozen-lockfile
=======
          yarn --immutable
>>>>>>> Stashed changes
        env:
          HUSKY: "0" # By default do not run HUSKY install

      - name: 👬🏽 Check for conflicting versions across the monorepo
        run: bun run g:check:deps:mismatch
