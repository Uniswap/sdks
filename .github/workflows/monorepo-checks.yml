name: "Code Quality Checks"

on:
  workflow_call:

  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions: {}

jobs:
  build-and-test:
    name: Lint, Build, and Test
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    defaults:
      run:
        working-directory: ./

    steps:
      - uses: bullfrogsec/bullfrog@dcde5841b19b7ef693224207a7fdec67fce604db # v0.8.3
        with:
          egress-policy: audit
      - name: ✅ Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          submodules: "recursive"
          fetch-depth: 2
          persist-credentials: false

      - name: 💽 Setup Node
        uses: actions/setup-node@1a4442cacd436585916779262731d5b162bc6ec7
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: 1.3.10

      - name: 📥 Install dependencies
        shell: bash
        working-directory: ./
        run: |
          bun install --frozen-lockfile
        env:
          HUSKY: "0" # By default do not run HUSKY install

      - name: 🔬 Lint
        run: bun run g:lint

      - name: 🏗  Build
        run: bun run g:build

      - name: 🪨 Install Foundry
        uses: foundry-rs/foundry-toolchain@82dee4ba654bd2146511f85f0d013af94670c4de # v1
        with:
          version: nightly

      - name: 🧪 Testing
        uses: nick-fields/retry@7d4a37704547a311dbb66ebdf5b23ec19374a767
        env:
          FORK_URL: ${{ secrets.FORK_URL }}
          FORK_URL_8453: ${{ secrets.FORK_URL_8453 }}
        with:
          timeout_minutes: 20
          retry_wait_seconds: 2
          max_attempts: 3
          command: bun run g:test
