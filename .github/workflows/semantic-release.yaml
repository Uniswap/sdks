# Release Workflow
#
# This workflow runs on every push to main and uses the changesets/action to
# handle versioning and publishing. It operates in two modes:
#
# 1. When changeset files exist (.changeset/*.md):
#    - Runs `yarn version-packages` (changeset version) to consume changesets,
#      bump versions in package.json files, and update CHANGELOGs
#    - Creates or updates a "Version Packages" PR with those changes
#    - Does NOT publish to npm
#
# 2. When no changeset files exist (e.g., the "Version Packages" PR was just merged):
#    - Runs `yarn g:release` (changeset publish) to publish all packages
#      with new versions to npm
#    - If all packages are already published, this is a no-op
#
# Typical flow:
#   Feature PR (with changeset) merges → this workflow creates "Version Packages" PR
#   → team approves & merges → this workflow publishes to npm

name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    environment:
      name: production
    runs-on:
      group: npm-deploy
    permissions:
      contents: write # needed to create the "Version Packages" PR and push tags
      id-token: write # needed for npm trusted publishing (OIDC) and provenance
      pull-requests: write # needed to create/update the "Version Packages" PR
    steps:
      - uses: bullfrogsec/bullfrog@dcde5841b19b7ef693224207a7fdec67fce604db # v0.8.3
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          submodules: "true"
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@1a4442cacd436585916779262731d5b162bc6ec7
        with:
          cache: yarn
          node-version: 22
          # Do not set registry-url here — it creates .npmrc with
          # _authToken=${NODE_AUTH_TOKEN} which, when unset, prevents npm
          # from falling through to OIDC-based Trusted Publishing auth.

      - name: Install dependencies
        run: yarn --immutable

      - name: Build SDK's
        run: yarn g:build

      - name: Verify npm auth
        run: npm whoami --registry https://registry.npmjs.org 2>&1 || echo "npm OIDC auth not yet active (expected before publish)"

      # The changesets/action automatically detects which mode to run:
      # - version: runs when there are pending changeset files (creates/updates PR)
      # - publish: runs when there are no pending changesets (publishes to npm)
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: yarn version-packages
          publish: yarn g:release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_CONFIG_PROVENANCE: "true"
          # No NPM_TOKEN needed — npm auth uses trusted publishing (OIDC via id-token)
